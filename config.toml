# =========================
# Global Audio Settings
# =========================

[audio]
sample_rate = 16000
mono = true
normalize = true


# =========================
# STFT Parameters
# =========================

[stft]
window_size = 1024
hop_length = 256
window_type = "hann"


# =========================
# Noise Reduction
# =========================

[noise_reduction]
noise_floor_db = -40.0
min_preserve_harmonic_hz = 80.0
max_preserve_harmonic_hz = 3500.0


# =========================
# Voice Activity Detection
# =========================

[vad]
energy_threshold = 0.02
min_speech_duration_sec = 0.15


# =========================
# Pitch Analysis
# =========================

[pitch]
method = "basic-pitch" # options: "pyin", "basic-pitch"
fmin_hz = 80.0
fmax_hz = 400.0
voicing_threshold = 0.3
key_confidence_threshold = 0.4
fallback_key_root = 0     # C
fallback_key_mode = "major"

[basic_pitch]
onset_threshold = 0.5
frame_threshold = 0.3
amplitude_threshold = 0.1
minimum_note_length_ms = 100


# =========================
# Paths
# =========================

[paths]
input_dir = "data/input"
intermediate_dir = "data/tmp"
output_dir = "data/output"

[dataset]
train_path = "E:\\musdb18hq\\train"
test_path = "E:\\musdb18hq\\test"

[training]
batch_size = 2
learning_rate = 0.0001
epochs = 50
segment_length_sec = 5.0
save_interval = 1
checkpoint_dir = "data/checkpoints"


# =========================
# Arrangement & Synthesis
# =========================

[arrangement]
instruments = ["Acoustic Grand Piano", "Pad 1 (new age)", "Violin", "Electric Bass (finger)"]
sustain_factor = 1.2 # Multiply note duration for sustained instruments
chord_change_interval_beats = 4 # Change chord every 4 beats (1 bar in 4/4)
release_buffer_sec = 0.5 # Add this to note ends to avoid abrupt cuts

[synthesis]
soundfont_path = ".venv/Lib/site-packages/pretty_midi/TimGM6mb.sf2"
output_bgm_wav = "data/output/bgm_only.wav"
output_final_wav = "data/output/final_prototype.wav"


# =========================
# Mixing
# =========================

[mix]
vocal_gain_db = 0.0
bgm_gain_db = -6.0
headroom_db = -1.0
